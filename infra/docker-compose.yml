services:
  db:
    image: postgres:16
    container_name: tabletap-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tabletap
    ports:
      - "5432:5432"
    volumes:
      - tabletap_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tabletap"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  tabletap_pgdata: {}